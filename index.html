<!doctype html>
<html>

    <meta charset="UTF-8" />
    <title>AI Agent</title>
  </head>

  <body>
    <h2>AI Agent</h2>

    <textarea id="prompt" placeholder="Scrivi la tua richiesta"></textarea>

    <br /><br />

    <button id="sendBtn">Invia now</button>

    <div id="response"></div>

     html al build -->
  </body>
</html>
